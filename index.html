<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haritalı Hava Durumu Gösterici</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    
    <div class="language-switcher">
    <select id="language-select" onchange="changeLanguage(this.value)">
        <option value="tr">TR</option>
        <option value="en">EN</option>
    </select>
</div>

    <div class="main-wrapper">
        <div id="map-container"></div>

        <div class="weather-panel">
            <header>
                <h1><i class="fa-solid fa-map-location-dot"></i> Konum Seçin</h1>
                <p id="coords-display">Lat: --, Lon: --</p>
            </header>

            <main class="main-card">
                <div class="temp-wrapper">
                    <i class="fa-solid fa-cloud-sun weather-icon"></i>
                    <h2 id="temp-value">--°C</h2>
                </div>
                <p id="weather-desc">Haritaya tıklayın</p>
            </main>

            <section class="controls">
                <button id="refresh-btn" class="btn-primary hidden">
                    <i class="fa-solid fa-arrows-rotate"></i> Yenile
                </button>
                <button id="detail-btn" class="btn-secondary hidden">
                    <i class="fa-solid fa-list-ul"></i> Detaylar
                </button>
            </section>

            <section id="extra-details" class="details-panel hidden">
                <div class="detail-grid">
                    <div class="detail-item">
                        <i class="fa-solid fa-wind"></i>
                        <span>Rüzgar</span>
                        <p id="wind-speed">--</p>
                    </div>
                    <div class="detail-item">
                        <i class="fa-solid fa-compass"></i>
                        <span>Yön</span>
                        <p id="wind-dir">--</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
